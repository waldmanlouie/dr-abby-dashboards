const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const num = v => v >= 1e6 ? (v/1e6).toFixed(1).replace(/\.0$/,'')+'M' : v >= 1e3 ? Math.round(v/1e3)+'K' : String(v);

// Freshness badge — computed client-side against the viewer's clock
(function(){
  const b = document.getElementById('fresh-badge');
  const today = new Date(); const iso = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  if (DATA.date === iso) { b.className = 'badge fresh'; b.textContent = 'Built this morning'; }
  else { b.className = 'badge stale'; b.textContent = 'Briefing from ' + DATA.date; }
  if (DATA.meta_notes) document.getElementById('notes-slot').innerHTML = '<div class="notes">⚠️ ' + esc(DATA.meta_notes) + '</div>';
})();

function copyPrompt(text, btn){
  const done = () => { const t = document.getElementById('toast'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 1800); };
  if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text, done)); }
  else fallbackCopy(text, done);
}
function fallbackCopy(text, done){
  const ta = document.createElement('textarea'); ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select(); try{ document.execCommand('copy'); done(); }catch(e){ prompt('Copy this prompt:', text); } document.body.removeChild(ta);
}
function toggle(el){ el.closest('.card').classList.toggle('open'); }

// ---- Her wins ----
(function(){
  const wins = DATA.her_wins || [];
  if (!wins.length) return;
  document.getElementById('wins-sec').style.display = '';
  document.getElementById('wins').innerHTML = wins.map(w =>
    `<div class="win">🏆 ${esc(w.summary)} · <a href="${esc(w.url)}" target="_blank" rel="noopener">watch</a>` +
    (w.open_lane ? `<span class="lane">→ open lane: ${esc(w.open_lane)}</span>` : '') + `</div>`
  ).join('');
})();

// ---- Themes ----
(function(){
  const host = document.getElementById('themes');
  const themes = DATA.themes || [];
  if (!themes.length) { host.innerHTML = '<div class="empty">No themes in today\'s briefing.</div>'; return; }
  host.innerHTML = themes.map((t, i) => {
    const fires = '🔥'.repeat(Math.max(1, Math.min(3, t.heat || 1)));
    const cov = (t.her_coverage && t.her_coverage.status) || 'red';
    const vids = (t.videos || []).map(v =>
      `<div class="vid"><span class="who">@${esc(v.author)}</span> <span class="nums">(${esc(v.platform)}) · ${num(v.views)} views · ${v.x_baseline ? Math.round(v.x_baseline)+'× baseline · ' : ''}<span class="tier-${v.tier==='superviral'?'sv':'v'}">${esc(v.tier||'')}</span> · ${v.age_days}d · ${v.duration_s||'?'}s</span> · <a class="watch" href="${esc(v.url)}" target="_blank" rel="noopener">watch</a></div>`
    ).join('');
    const angles = (t.angles || []).map((a, j) => {
      const tag = a.verify ? '<span class="g verify">verify</span>' : (a.grounded === 'yes' ? '<span class="g yes">grounded</span>' : '<span class="g take">her take</span>');
      const prompt = `Script on ${t.name} — angle: ${a.angle}, ${t.winning_length || '60s'}, from today's briefing.`;
      return `<div class="angle">${tag}<span style="flex:1">${esc(a.angle)}</span><button class="draftbtn" onclick='copyPrompt(${JSON.stringify(prompt)}, this)'>Draft →</button></div>`;
    }).join('');
    const fit = t.her_coverage ?
      `<div class="fit">${esc(t.her_coverage.summary || '')}` +
      (t.corpus_position ? `<span class="pos">"${esc(t.corpus_position)}"</span>` : '') +
      ((t.her_coverage.links || []).length ? `<div class="cov-links">${t.her_coverage.links.map(l=>`<a class="watch" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)}</a>`).join(' · ')}</div>` : '') + `</div>` : '';
    const mainPrompt = `Script on ${t.name} — ${t.winning_length || '60s'}, from today's briefing. Angles: ${(t.angles||[]).map(a=>a.angle).join(' / ')}`;
    return `<div class="card">
      <div class="card-head" onclick="toggle(this)">
        <span class="dot ${cov}"></span>
        <div class="card-t"><div class="card-name">${esc(t.name)}</div><div class="card-sub">${esc(t.receipt || '')}</div></div>
        <span class="heat">${fires}</span><span class="chev">▶</span>
      </div>
      <div class="card-body">
        <div class="blk"><div class="blk-label">Receipts</div>${vids}</div>
        <div class="blk"><div class="blk-label">Your fit</div>${fit}</div>
        <div class="blk"><div class="blk-label">Winning length</div><div class="len"><b>${esc(t.winning_length || '—')}</b></div></div>
        <div class="blk"><div class="blk-label">Angles — she can own</div>${angles}</div>
        <button class="draftbtn big" onclick='copyPrompt(${JSON.stringify(mainPrompt)}, this)'>Draft this → (copies prompt for Claude)</button>
      </div>
    </div>`;
  }).join('');
})();

// ---- Stitch targets ----
(function(){
  const host = document.getElementById('stitches');

  if (!list.length) { host.innerHTML = '<div class="empty">No stitch targets today' + (DATA.stitch_generated_at ? '' : ' (feed unavailable)') + '.</div>'; return; }

  host.innerHTML = list.map(s => {
    const r = s.rubric || {};
    const rub = RUB.map(([k, lbl]) => {
      const v = r[k];
      const ok = (k === 'trigger') ? Boolean(v) : v === true;
      const txt = (k === 'trigger' && typeof v === 'string') ? `${lbl}: ${v}` : lbl;
      return `<div class="rub"><span class="ck ${ok?'y':'n'}">${ok?'✓':'✗'}</span> ${esc(txt)}</div>`;
    }).join('');
    const p = s.pitch || {};
    const angles = (p.angles || []).map(a => {
      const prompt = `Stitch react to @${s.author}: "${s.claim}" — ${s.url} — angle: ${a}, from today's briefing.`;
      return `<div class="angle"><span style="flex:1">${esc(a)}</span><button class="draftbtn" onclick='copyPrompt(${JSON.stringify(prompt)}, this)'>Draft →</button></div>`;
    }).join('');
    const mainPrompt = `Stitch react to @${s.author}: "${s.claim}" — ${s.url} — from today's briefing.`;
    return `<div class="card">
      <div class="card-head" onclick="toggle(this)">
        <div class="card-t">
          <div class="card-name">@${esc(s.author)} <span class="src-tag">${esc(s.source || 'feed')}${s.verify ? ' · verify' : ''}</span></div>
          <div class="card-sub">"${esc(s.claim)}"</div>
          <div class="card-sub stitch-meta">${s.verify ? '~' : ''}${num(s.views)} views · ${s.age_days}d${s.comment_heat ? ' · ' + num(s.comments) + ' comments 🔥' : ''} · <a class="watch" href="${esc(s.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">watch</a></div>
        </div>
        <span class="chev">▶</span>
      </div>
      <div class="card-body">
        <div class="blk"><div class="blk-label">The claim</div><div class="pitchblk">${esc(p.the_claim || s.claim)}</div></div>
        <div class="blk"><div class="blk-label">Why it stitches</div><div class="pitchblk">${esc(p.why_it_stitches || '')}</div></div>
        <div class="blk"><div class="blk-label">Stitch rubric</div><div class="rubric">${rub}</div></div>
        <div class="blk"><div class="blk-label">Your fit</div><div class="pitchblk">${esc(p.your_fit || '')}</div></div>
        <div class="blk"><div class="blk-label">Length</div><div class="len">${esc(p.length || '')}</div></div>
        <div class="blk"><div class="blk-label">React angles</div>${angles}</div>
        <button class="draftbtn big" onclick='copyPrompt(${JSON.stringify(mainPrompt)}, this)'>Draft stitch → (copies prompt for Claude)</button>
      </div>
    </div>`;
  }).join('');
})();
