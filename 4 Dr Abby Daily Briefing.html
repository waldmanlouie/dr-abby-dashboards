// Never embed prompt text in onclick attributes (apostrophes break them).
function doCopy(text){
  const done = () => { const t = document.getElementById('toast'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 1800); };
  if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text, done)); }
  else fallbackCopy(text, done);
}
function fallbackCopy(text, done){
  const ta = document.createElement('textarea'); ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select(); try{ document.execCommand('copy') ? done() : prompt('Copy this prompt:', text); }catch(e){ prompt('Copy this prompt:', text); } document.body.removeChild(ta);
}

const RUB_LABELS = {specific_claim:'specific claim', her_lane:'her lane', trigger:'trigger', rising:'still rising', big_enough:'big enough', punches_ok:'punches fair'};
function rubLine(r){
  if (!r) return '';
  const misses = Object.keys(RUB_LABELS).filter(k => k === 'trigger' ? !r[k] : r[k] !== true);
  const score = r.score != null ? r.score : 6 - misses.length;
  let html = `<div class="rubline"><b>Rubric ${score}/6</b>${r.trigger ? ' · trigger: ' + esc(r.trigger) : ''}`;
  if (misses.length) html += ` · <span class="miss">misses: ${misses.map(k=>RUB_LABELS[k]).join(', ')}</span>`;
  return html + '</div>';
}

  document.getElementById('wins-sec').style.display = '';
  document.getElementById('wins').innerHTML = wins.map(w =>
    `<div class="win">🏆 ${plat(w.platform)} ${grPill(w)}${esc(w.summary)}${w.age_days != null ? ' · ' + fmtAge(w.age_days) + ' ago' : ''} · <a href="${esc(w.url)}" target="_blank" rel="noopener">watch</a>` +
    (w.open_lane ? `<span class="lane">→ open lane: ${esc(w.open_lane)}</span>` : '') + `</div>`
  ).join('');
})();

// ---- Themes ----
(function(){
  const host = document.getElementById('themes');
  const themes = DATA.themes || [];
  if (!themes.length) { host.innerHTML = '<div class="empty">No themes in today\'s briefing.</div>'; return; }
  host.innerHTML = themes.map((t, ti) => {
    const cov = (t.her_coverage && t.her_coverage.status) || 'red';
    const vids = (t.videos || []).map(v =>
      `<div class="vid">${plat(v.platform)} <span class="who">@${esc(v.author)}</span> ${tierPill(v.tier)}${boPill(v.breakout)}${grPill(v)} <span class="nums">· ${num(v.views)} views in ${fmtAge(v.age_days)} · ${v.x_baseline ? Math.round(v.x_baseline)+'× baseline · ' : ''}${v.duration_s||'?'}s</span> · <a class="watch" href="${esc(v.url)}" target="_blank" rel="noopener">watch</a></div>`
    ).join('');
    const angles = (t.angles || []).map((a, ai) => {
      const tag = a.verify ? '<span class="g verify">verify</span>' : (a.grounded === 'yes' ? '<span class="g yes">grounded</span>' : '<span class="g take">her take</span>');
      return `<div class="angle">${tag}<span style="flex:1">${esc(a.angle)}</span><button class="draftbtn" onclick="copyTheme(${ti},${ai})">Draft →</button></div>`;
    }).join('');
    const fit = t.her_coverage ?
      `<div class="fit">${esc(t.her_coverage.summary || '')}` +
      (t.corpus_position ? `<span class="pos">"${esc(t.corpus_position)}"</span>` : '') +
      ((t.her_coverage.links || []).length ? `<div class="cov-links">${t.her_coverage.links.map(l=>`<a class="watch" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)}</a>`).join(' · ')}</div>` : '') + `</div>` : '';
    return `<div class="card">
      <div class="card-head" onclick="toggle(this)">
        <span class="dot ${cov}"></span>
        <div class="card-t"><div class="card-name">${esc(t.name)}</div><div class="card-sub">${esc(t.receipt || '')}</div></div>
        <span class="heat">${fires(t.heat)}</span><span class="chev">▶</span>
      </div>
      <div class="card-body">
        <div class="blk"><div class="blk-label">Receipts</div>${vids}</div>
        <div class="blk"><div class="blk-label">Your fit</div>${fit}</div>
        <div class="blk"><div class="blk-label">Winning length</div><div class="len"><b>${esc(t.winning_length || '—')}</b></div></div>
        <div class="blk"><div class="blk-label">Angles — she can own</div>${angles}</div>
        <button class="draftbtn big" onclick="copyTheme(${ti},-1)">Draft this → (copies prompt for Claude)</button>
      </div>
    </div>`;
  }).join('');
})();

// ---- Stitch card builder (shared by shortlist + virality watch) ----
function stitchCard(s, si, listName, mini){
  const p = s.pitch || {};
  const angles = (p.angles || []).map((a, ai) =>
    `<div class="angle"><span style="flex:1">${esc(a)}</span><button class="draftbtn" onclick="copyStitch('${listName}',${si},${ai})">Draft →</button></div>`
  ).join('');
  const viral = s.viral ? ' <span class="viral-tag">🚀 viral</span>' : '';
  const meta = `${s.verify ? '~' : ''}${num(s.views)} views in ${fmtAge(s.age_days)}${s.comment_heat ? ' · ' + num(s.comments) + ' comments 🔥' : ''} · <a class="watch" href="${esc(s.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">watch</a>`;
  return `<div class="card${mini ? ' mini' : ''}">
    <div class="card-head" onclick="toggle(this)">
      <div class="card-t">
        <div class="card-name">${plat(s.platform)} @${esc(s.author)} <span class="src-tag">${esc(s.source || 'feed')}${s.verify ? ' · verify' : ''}</span>${viral}</div>
        <div class="card-sub">"${esc(s.claim)}"</div>
        <div class="card-sub stitch-meta">${meta} ${s.rubric ? '· rubric ' + (s.rubric.score != null ? s.rubric.score : '?') + '/6' : ''}</div>
      </div>
      <span class="heat">${s.heat ? fires(s.heat) : ''}</span><span class="chev">▶</span>
    </div>
    <div class="card-body">
      ${p.the_claim ? `<div class="blk"><div class="blk-label">The claim</div><div class="pitchblk">${esc(p.the_claim)}</div></div>` : ''}
      ${p.why_it_stitches ? `<div class="blk"><div class="blk-label">Why it stitches</div><div class="pitchblk">${esc(p.why_it_stitches)}</div></div>` : ''}
      <div class="blk"><div class="blk-label">Stitch rubric</div>${rubLine(s.rubric)}</div>
      ${p.your_fit ? `<div class="blk"><div class="blk-label">Your fit</div><div class="pitchblk">${esc(p.your_fit)}</div></div>` : ''}
      ${p.length ? `<div class="blk"><div class="blk-label">Length</div><div class="len">${esc(p.length)}</div></div>` : ''}
      ${angles ? `<div class="blk"><div class="blk-label">React angles</div>${angles}</div>` : ''}
      ${s.unidentified
        ? `<a class="draftbtn big" style="text-decoration:none" href="${esc(s.url)}" target="_blank" rel="noopener">Watch in-app first → (content unidentifiable from feed)</a>`
        : `<button class="draftbtn big" onclick="copyStitch('${listName}',${si},-1)">Draft stitch → (copies prompt for Claude)</button>`}
    </div>
  </div>`;
}

// ---- Stitch shortlist (ranked by heat, then views) ----
(function(){
  const host = document.getElementById('stitches');
  const list = DATA.stitch_shortlist || [];
  if (!list.length) { host.innerHTML = '<div class="empty">No stitch targets today' + (DATA.stitch_generated_at ? '' : ' (feed unavailable)') + '.</div>'; return; }
  const order = list.map((s, i) => i).sort((a, b) => ((list[b].heat||0) - (list[a].heat||0)) || (list[b].views - list[a].views));
  host.innerHTML = order.map(i => stitchCard(list[i], i, 'stitch_shortlist', false)).join('');
})();

// ---- Virality watch: huge waves that missed the rubric bar ----
(function(){
  const list = DATA.more_stitches || [];
  if (!list.length) return;
  document.getElementById('more-stitch-sec').style.display = '';
  const order = list.map((s, i) => i).sort((a, b) => list[b].views - list[a].views);
  document.getElementById('more-stitches').innerHTML = order.map(i => stitchCard(list[i], i, 'more_stitches', true)).join('');
})();

// ---- More trending topics (one-line expandable) ----
(function(){
  const more = DATA.more_topics || [];
  if (!more.length) return;
  document.getElementById('more-sec').style.display = '';
  document.getElementById('more').innerHTML = more.map((m, mi) =>
    `<div class="card mini">
      <div class="card-head" onclick="toggle(this)">
        <div class="card-t"><div class="card-name">${m.heat ? fires(m.heat) + ' ' : ''}${plat(m.platform)} ${esc(m.topic)}${grPill(m)}</div>
        <div class="card-sub">${esc(m.receipt || '')} · <a class="watch" href="${esc(m.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">watch</a></div></div>
        <span class="chev">▶</span>
      </div>
      <div class="card-body">
        ${m.note ? `<div class="blk"><div class="pitchblk">${esc(m.note)}</div></div>` : ''}
        <button class="draftbtn big" onclick="copyMoreTopic(${mi})">Draft this → (copies prompt for Claude)</button>
      </div>
    </div>`
  ).join('');
})();

// ---- News (why-now shelf) ----
function copyNews(ni){
  const n = (DATA.news || [])[ni]; if (!n || !n.her_angle) return;
  doCopy(`Script pegged to the news: ${n.headline} — angle: ${n.her_angle}, from today's briefing.`);
}
(function(){
  const news = DATA.news || [];
  if (!news.length) return;
  document.getElementById('news-sec').style.display = '';
  const ageTag = n => {
    let out = '';
    if (n.age_days != null) {
      const d = Math.round(n.age_days);
      out = d < 2 ? `<span class="agechip breaking">🔴 BREAKING · ${d === 0 ? 'today' : d + 'd ago'}</span>` : `<span class="agechip">${d}d ago</span>`;
    }
    if (n.event_date) out += ` <span class="agechip upcoming">event · ${esc(n.event_date)}</span>`;
    return out;
  };
  document.getElementById('news').innerHTML = news.map((n, ni) =>
    `<div class="newsitem">📰 <span class="hl">${esc(n.headline)}</span> ${ageTag(n)} <span class="src">· ${esc(n.source)} · <a class="watch" href="${esc(n.url)}" target="_blank" rel="noopener">read</a> · verify</span><br>${esc(n.summary)}` +
    (n.her_angle ? `<span class="ang">→ her angle: ${esc(n.her_angle)} <button class="draftbtn" onclick="copyNews(${ni})" style="margin-left:8px">Draft →</button></span>` : '') + `</div>`
  ).join('');
})();

// ---- Footer ----
(function(){
  const age = DATA.source_extract ? Math.round((Date.now() - new Date(DATA.source_extract).getTime())/36e5) : null;
  document.getElementById('foot').innerHTML =
    `Interpreted ${esc(DATA.generated_at || '')} by ${esc(DATA.generated_by || 'briefing-build')}<br>` +
    `Source extract: ${esc(DATA.source_extract || '—')}${age !== null ? ' (' + age + 'h old)' : ''} · schema v${DATA.schema || 1}` +
    (DATA.meta_notes ? `<div class="foot-notes">⚠️ ${esc(DATA.meta_notes)}</div>` : '');
})();
</script>
