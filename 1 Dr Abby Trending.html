let currentPlatform = 'ALL';

document.getElementById('extractDate').textContent = 'Extract: ' + DATA.extractDate;

// ═══════════════════════════════════════════════════════
//  FORMATTING & UI
// ═══════════════════════════════════════════════════════
function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '-';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return n.toLocaleString();
}
function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function engClass(e) { return e >= 5 ? 'engagement-high' : e >= 2 ? 'engagement-med' : 'engagement-low'; }
function getTier(vhr) {
  if (vhr >= 10000) return { cls:'tier-super', badge:'<span class="tier-badge super">SUPER VIRAL</span>' };
  if (vhr >= 1000)  return { cls:'tier-viral', badge:'<span class="tier-badge viral">VIRAL</span>' };
  if (vhr >= 100)   return { cls:'tier-avg',   badge:'' };
  return { cls:'tier-poor', badge:'<span class="tier-badge poor">POOR</span>' };
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

// ═══════════════════════════════════════════════════════
//  PLATFORM FILTER
// ═══════════════════════════════════════════════════════
function setFilter(btn) {
  document.querySelectorAll('.toggle-btn').forEach(b => b.className = 'toggle-btn');
  const p = btn.dataset.plat;
  currentPlatform = p;
  const cls = p === 'ALL' ? 'active-all' : p === 'TT' ? 'active-tt' : p === 'IG' ? 'active-ig' : 'active-yt';
  btn.classList.add(cls);
  renderTable();
}

// ═══════════════════════════════════════════════════════
//  BREAKOUT FILTER
// ═══════════════════════════════════════════════════════
function setBreakoutFilter(btn, on) {
  document.querySelectorAll('.breakout-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  breakoutOnly = on;
  renderTable();
}

function getBreakoutBadge(bo) {
  if (!bo) return '';
  var pct = bo === 'gold' ? '1%' : bo === 'silver' ? '3%' : '5%';
  return '<span class="breakout-badge bo-'+bo+'"><span class="bo-icon">\uD83D\uDD25</span> '+pct+'</span>';
}

// ═══════════════════════════════════════════════════════

document.querySelectorAll('th[data-key]').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.key;
    if (sortKey === key) sortDir *= -1;
    else { sortKey = key; sortDir = -1; }
    renderTable();
  });
});

// ═══════════════════════════════════════════════════════

function setAuthorFilter(mode) {
  abbyOnly = (mode === 'abby');
  document.querySelectorAll('.author-toggle button').forEach(function(b) { b.classList.remove('active'); });
  event.target.classList.add('active');
  renderTable();
}

function getFiltered() {
  // Base list: platform-filtered, sorted by views/hr desc — this defines the rank
  let base = DATA.videos;
  if (currentPlatform !== 'ALL') base = base.filter(v => v.platform === currentPlatform);
  base.sort((a,b) => (b.viewsHr||0) - (a.viewsHr||0));
  base.forEach((v,i) => { v._rank = i + 1; });

  // Apply author and search filters (rank stays from base list)
  let vids = base;
  if (abbyOnly) vids = vids.filter(v => v.isAbby);
  if (breakoutOnly) vids = vids.filter(v => v.breakout);
  const q = document.getElementById('searchInput').value.toLowerCase();
  if (q) vids = vids.filter(v => (v.author+' '+v.text+' '+v.music).toLowerCase().includes(q));
  vids.sort((a,b) => {
    const sk = sortKey === 'postDate' ? 'postDateRaw' : sortKey;
    let va = a[sk], vb = b[sk];
    if (typeof va === 'string') return sortDir * va.localeCompare(vb);
    return sortDir * ((va||0) - (vb||0));
  });
  return vids;
}

function tierDelta(currentPct, baselinePct) {
  if (baselinePct === null || baselinePct === undefined) return '';
  const diff = currentPct - baselinePct;
  if (Math.abs(diff) < 0.5) return '<span class="tier-delta flat">~</span>';
  const arrow = diff > 0 ? '\u25B2' : '\u25BC';
  // For SV/Viral: higher is good. For Poor: lower is good.
  return '<span class="tier-delta">' + arrow + Math.abs(diff).toFixed(0) + '%</span>';
}

function tierDeltaColored(currentPct, baselinePct, higherIsGood) {
  if (baselinePct === null || baselinePct === undefined) return '';
  const diff = currentPct - baselinePct;
  if (Math.abs(diff) < 0.5) return '<span class="tier-delta flat">~</span>';
  const arrow = diff > 0 ? '\u25B2' : '\u25BC';
  let cls;
  if (diff > 0) cls = higherIsGood ? 'up' : 'down';
  else cls = higherIsGood ? 'down' : 'up';
  return '<span class="tier-delta '+cls+'">' + arrow + ' ' + Math.abs(diff).toFixed(0) + '%</span>';
}

function fmtCompact(n) {
  if (n >= 1000000) return '~' + (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return '~' + (n/1000).toFixed(0) + 'K';
  return n.toLocaleString();
}
function fmtFollowers(n) { return n.toLocaleString(); }

function compareHtml(current, baseline, formatFn, higherIsGood) {
  if (baseline === null || baseline === undefined) return '';
  const diff = current - baseline;
  const pctChange = Math.round(Math.abs(diff) / Math.max(Math.abs(baseline), 1) * 100);
  let arrow, cls;
  if (pctChange < 2) { arrow = '~'; cls = 'flat'; }
  else if (diff > 0) { arrow = '\u25B2'; cls = higherIsGood ? 'up' : 'down'; }
  else { arrow = '\u25BC'; cls = higherIsGood ? 'down' : 'up'; }
  if (cls === 'flat') return '<div class="compare flat">~ vs 6mo avg</div>';
  return '<div class="compare '+cls+'">'+arrow+' '+formatFn(Math.abs(diff))+' ('+pctChange+'%) vs 6mo avg</div>';
}

        let delta = '';
        if (pb && pb.avgTotalViews) {
          const diff = ps.totalViews - pb.avgTotalViews;
          const pctChg = Math.round(Math.abs(diff) / pb.avgTotalViews * 100);
          if (pctChg < 2) { delta = ' <span class="flat">~</span>'; }
          else if (diff > 0) { delta = ' <span class="up">\u25B2 '+pctChg+'%</span>'; }
          else { delta = ' <span class="down">\u25BC '+pctChg+'%</span>'; }
        }
        lines.push('<div class="reach-plat">'+p+' '+fmtCompact(ps.totalViews)+delta+'</div>');
      }
    });
    if (lines.length) reachBreakdown = '<div class="reach-breakdown">' + lines.join('') + '</div>';
  }
  const card2 = '<div class="stat-card">' +
    '<div class="label">Total Reach</div>' +
    '<div class="value">'+fmtCompact(snap.totalViews)+'</div>' +
    reachBreakdown +
    reachCmp +
    '</div>';

  // Card 3: Videos in top 10%
  const ranks = snap.ranks || [];
  const total = snap.totalInRanking;
  const cutoff = Math.ceil(total * 0.1);
  const topRanks = ranks.filter(function(r) { return r.rank <= cutoff; });
  let rankDisplay = '';
  if (topRanks.length) {
    const chips = topRanks.map(function(r) {
      const platTag = platKey === 'ALL' ? '<span class="rank-plat">'+r.plat+'</span>' : '';
      return '<span class="rank-chip">#'+r.rank+platTag+'</span>';
    }).join(' ');
    rankDisplay = '<div class="rank-chips">'+chips+'</div>' +
      '<div class="sub">of '+total+' ranked videos</div>';
  } else {
    rankDisplay = '<div class="sub">None in top '+cutoff+'</div>';
  }
  const card3 = '<div class="stat-card">' +
    '<div class="label">Videos in Top 10%</div>' +
    '<div class="value">'+topRanks.length+'</div>' +
    rankDisplay +
    '</div>';

  // Card 4: Follower Growth
  let card4 = '';
  const fg = DATA.followerGrowth;
  if (fg) {
    const gKey = platKey === 'ALL' ? 'ALL' : platKey;
    const g = fg[gKey];
    if (g && g.weekly2wk !== undefined) {
      const weekly = g.weekly2wk;
      const weeklyFmt = (weekly >= 0 ? '+' : '') + fmtFollowers(Math.abs(weekly));
      // Compare 2wk rate to 6mo rate using raw (unrounded) values
      let growthCmp = '';
      const raw2 = g.weekly2wkRaw !== undefined ? g.weekly2wkRaw : weekly;
      const raw6 = g.weekly6moRaw !== undefined ? g.weekly6moRaw : g.weekly6mo;
      if (raw6 !== undefined && raw6 !== 0) {
        const pctChg = Math.round((raw2 - raw6) / Math.abs(raw6) * 100);
        if (Math.abs(pctChg) < 2) { growthCmp = '<div class="compare flat">~ vs 6mo avg</div>'; }
        else {
          const arrow = pctChg > 0 ? '\u25B2' : '\u25BC';
          const cls = pctChg > 0 ? 'up' : 'down';
          const sign = pctChg > 0 ? '+' : '';
          growthCmp = '<div class="compare '+cls+'">'+arrow+' '+sign+pctChg+'% vs 6mo avg</div>';
        }
      }
      // Platform breakdown when ALL
      let growthBreak = '';
      if (platKey === 'ALL') {
        const lines = [];
        ['TT','IG','YT'].forEach(function(p) {
          const pg = fg[p];
          if (pg && pg.weekly2wk !== undefined) {
            const w = pg.weekly2wk;
            const wFmt = (w >= 0 ? '+' : '') + fmtFollowers(Math.abs(w));
            let delta = '';
            const pr2 = pg.weekly2wkRaw !== undefined ? pg.weekly2wkRaw : w;
            const pr6 = pg.weekly6moRaw !== undefined ? pg.weekly6moRaw : pg.weekly6mo;
            if (pr6 !== undefined && pr6 !== 0) {
              const pc = Math.round((pr2 - pr6) / Math.abs(pr6) * 100);
              if (Math.abs(pc) < 2) { delta = ' <span class="flat">~</span>'; }
              else if (pc > 0) { delta = ' <span class="up">\u25B2 +'+pc+'%</span>'; }
              else { delta = ' <span class="down">\u25BC '+pc+'%</span>'; }
            }
            lines.push('<div class="growth-plat">'+p+' '+wFmt+'/wk'+delta+'</div>');
          }
        });
        if (lines.length) growthBreak = '<div class="growth-breakdown">' + lines.join('') + '</div>';
      }
      card4 = '<div class="stat-card">' +
        '<div class="label">Followers '+fmtFollowers(g.followers)+'</div>' +
        '<div class="value">'+weeklyFmt+'/wk</div>' +
        growthBreak +
        growthCmp +
        '</div>';
    }
  }

  bar.innerHTML = card1 + card2 + card3 + card4;
}

function renderTable() {
  const vids = getFiltered();
  renderStats();
  renderCards(vids);
  document.querySelectorAll('th[data-key]').forEach(th => {
    th.classList.remove('sorted-asc','sorted-desc');
    if (th.dataset.key === sortKey) th.classList.add(sortDir === 1 ? 'sorted-asc' : 'sorted-desc');
  });
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = vids.map((v,i) => {
    const tier = getTier(v.viewsHr);
    const urlLink = v.url ? '<a class="url-link" href="'+esc(v.url)+'" target="_blank">link</a>' : '';
    const sharesDisplay = v.sharesNull ? '-' : fmt(v.shares);
    const textClean = esc(v.text).replace(/\n/g,' ');
    return '<tr class="'+tier.cls+'">' +
      '<td class="rank-cell">'+v._rank+'</td>' +
      '<td style="white-space:nowrap">'+esc(v.postDate)+'</td>' +
      '<td><span class="platform-badge badge-'+v.platform+'">'+v.platform+'</span></td>' +
      '<td class="author-cell">'+esc(v.author)+' '+urlLink+'</td>' +
      '<td class="num">'+(v.len||'-')+'</td>' +
      '<td class="music-cell" title="'+esc(v.music)+'">'+esc(v.music)+'</td>' +
      '<td class="num">'+fmt(v.viewsHr)+tier.badge+getBreakoutBadge(v.breakout)+'</td>' +
      '<td class="num">'+fmt(v.views)+'</td>' +
      '<td class="num">'+fmt(v.likes)+'</td>' +
      '<td class="num">'+sharesDisplay+'</td>' +
      '<td class="num">'+fmt(v.comments)+'</td>' +
      '<td class="num '+engClass(v.engagement)+'">'+v.engagement+'%</td>' +
      '<td class="text-cell" title="'+textClean+'">'+textClean+'</td>' +
    '</tr>';
  }).join('');
}

// ═══════════════════════════════════════════════════════
//  MOBILE SORT + CARD RENDERING
// ═══════════════════════════════════════════════════════
function mobileSort(chip) {
  const sk = chip.dataset.sk;
  if (sortKey === sk) sortDir *= -1;
  else { sortKey = sk; sortDir = -1; }
  document.querySelectorAll('.sort-chip').forEach(c => c.className = 'sort-chip');
  chip.classList.add('active', sortDir === -1 ? 'desc' : 'asc');
  renderTable();
}

function renderCards(vids) {
  const cl = document.getElementById('cardList');
  if (!cl) return;
  cl.innerHTML = vids.map((v,i) => {
    const tier = getTier(v.viewsHr);
    const sharesDisplay = v.sharesNull ? '-' : fmt(v.shares);
    const platCls = 'plat-' + v.platform;
    const watchLabel = v.platform === 'TT' ? 'TikTok' : v.platform === 'IG' ? 'Instagram' : 'YouTube';
    const watchBtn = v.url ? '<a class="vcard-watch '+platCls+'" href="'+esc(v.url)+'" target="_blank">&#9654; '+watchLabel+'</a>' : '';
    const textClean = esc(v.text).replace(/\n/g,' ');
    return '<div class="vcard '+tier.cls+'">' +
      '<div class="vcard-top">' +
        '<span class="vcard-rank">#'+v._rank+'</span>' +
        '<span class="vcard-author">'+esc(v.author)+'<span class="vcard-tier">'+tier.badge+getBreakoutBadge(v.breakout)+'</span></span>' +
        watchBtn +
      '</div>' +
      '<div class="vcard-metrics">' +
        '<div class="vcard-m"><div class="ml">Views/hr</div><div class="mv'+(v.viewsHr>=1000?' hot':'')+'">'+fmt(v.viewsHr)+'</div></div>' +
        '<div class="vcard-m"><div class="ml">Views</div><div class="mv">'+fmt(v.views)+'</div></div>' +
        '<div class="vcard-m"><div class="ml">Eng%</div><div class="mv '+engClass(v.engagement)+'">'+v.engagement+'%</div></div>' +
        '<div class="vcard-m"><div class="ml">Likes</div><div class="mv">'+fmt(v.likes)+'</div></div>' +
        '<div class="vcard-m"><div class="ml">Comments</div><div class="mv">'+fmt(v.comments)+'</div></div>' +
        '<div class="vcard-m"><div class="ml">Shares</div><div class="mv">'+sharesDisplay+'</div></div>' +
      '</div>' +
      '<div class="vcard-meta"><span class="vmdate">'+esc(v.postDate)+'</span> &middot; '+v.len+'s' + (v.music ? ' &middot; '+esc(v.music) : '') + '</div>' +
      (textClean ? '<div class="vcard-text" onclick="this.classList.toggle(\x27expanded\x27)">'+textClean+'</div>' : '') +
    '</div>';
  }).join('');
}

// ═══════════════════════════════════════════════════════
//  INDEXEDDB — persist file handle across page loads
// ═══════════════════════════════════════════════════════
function openDB() {
  return new Promise((res,rej) => {
    const req = indexedDB.open('CompetitorDashboardDB', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('store');
    req.onsuccess = e => res(e.target.result);
    req.onerror = rej;
  });
}
async function storeHandle(handle) {
  try {
    const db = await openDB();
    await new Promise((res,rej) => {
      const tx = db.transaction('store','readwrite');
      tx.objectStore('store').put(handle, 'fileHandle');
      tx.oncomplete = res; tx.onerror = rej;
    });
  } catch(e) {}
}
async function getStoredHandle() {
  try {
    const db = await openDB();
    return await new Promise((res,rej) => {
      const tx = db.transaction('store','readonly');
      const req = tx.objectStore('store').get('fileHandle');
      req.onsuccess = () => res(req.result || null);
      req.onerror = rej;
    });
  } catch(e) { return null; }
}

// ═══════════════════════════════════════════════════════
//  EXCEL PARSING (retained for reference/future use)
// ═══════════════════════════════════════════════════════
function normDur(v) {
  if (v == null || v === '') return 0;
  const s = String(v);
  if (s.includes(':')) {
    const p = s.split(':');
    return parseInt(p[0])*3600 + parseInt(p[1])*60 + parseInt(p[2]);
  }
  const n = parseFloat(s);
  return isNaN(n) ? 0 : Math.round(n);
}

function toDate(val) {
  if (!val) return null;
  if (val instanceof Date) return val;
  if (typeof val === 'number') return new Date(Math.round((val - 25569) * 86400000));
  const d = new Date(String(val));
  return isNaN(d) ? null : d;
}

function fmtDate(d) {
  if (!d) return '';
  let h = d.getHours();
  const ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  const min = String(d.getMinutes()).padStart(2, '0');
  const yr = String(d.getFullYear()).slice(-2);
  return (d.getMonth()+1) + '/' + d.getDate() + '/' + yr + ', ' + h + ':' + min + ampm;
}

function processRows(rows) {
  const platMap = { TikTok:'TT', Instagram:'IG', YouTube:'YT' };
  const get = (row, ...keys) => {
    for (const k of keys) {
      const found = Object.keys(row).find(rk => rk.trim().toLowerCase() === k.toLowerCase());
      if (found !== undefined && row[found] !== '' && row[found] != null) return row[found];
    }
    return null;
  };

  // Parse all rows
  const all = rows.map(row => {
    const extractDate = toDate(get(row, 'Extract Date'));
    const createTime  = toDate(get(row, 'CreateTime'));
    return {
      extractDate,
      extractDateStr: extractDate ? extractDate.toISOString().slice(0,10) : '',
      createTime,
      platform: get(row, 'Platform') || '',
      author:   get(row, 'Author') || '',
      duration: normDur(get(row, 'Duration (s)')),
      music:    get(row, 'Music') || '',
      views:    Number(get(row, 'Views')) || 0,
      likes:    Number(get(row, 'Likes')) || 0,
      comments: Number(get(row, 'Comments')) || 0,
      shares:   get(row, 'Shares'),
      url:      get(row, 'URL') || '',
      vidId:    get(row, 'VidID'),
      title:    get(row, 'Title'),
      text:     get(row, 'Text') || '',
    };
  });

  // Filter: max extract date (date only)
  const maxDate = all.reduce((m, r) => r.extractDateStr > m ? r.extractDateStr : m, '');
  let filtered = all.filter(r => r.extractDateStr === maxDate && r.vidId != null);

  // Dedup: for each VidID keep row with max Views
  const byVid = {};
  for (const r of filtered) {
    const vid = String(r.vidId);
    if (!byVid[vid] || r.views > byVid[vid].views) byVid[vid] = r;
  }
  filtered = Object.values(byVid);

  // Build output records
  const records = filtered.map(r => {
    const postDate = r.createTime ? new Date(r.createTime.getTime() - 4*3600000) : null;
    const hrsDiff  = (postDate && r.extractDate) ? (r.extractDate - postDate) / 3600000 : 0;
    const viewsHr  = hrsDiff > 0 ? Math.round(r.views / hrsDiff * 10) / 10 : 0;

    const sharesNull = r.shares == null || r.shares === '';
    const sharesNum  = sharesNull ? 0 : Number(r.shares);
    const l = r.likes || 0, c = r.comments || 0;
    let eng = 0;
    if (r.views > 0) {
      eng = sharesNull ? (c + l) / r.views * 100 : (c + l + sharesNum) / r.views * 100;
    }
    eng = Math.round(eng * 100) / 100;

    let displayText = r.text || '';
    if (r.title != null && r.title !== '') {
      displayText = displayText ? String(r.title) + '; ' + String(displayText) : String(r.title);
    }
    if (displayText.length > 300) displayText = displayText.slice(0, 300);

    return {
      postDate: fmtDate(postDate),
      author: r.author,
      len: r.duration,
      music: r.music,
      viewsHr, views: r.views,
      likes: r.likes, shares: sharesNull ? -1 : sharesNum,
      comments: r.comments, engagement: eng,
      text: displayText,
      platform: platMap[r.platform] || r.platform,
      url: r.url,
      sharesNull
    };
  });

  records.sort((a,b) => b.viewsHr - a.viewsHr);
  return { extractDate: maxDate, videos: records };
}

renderTable();
